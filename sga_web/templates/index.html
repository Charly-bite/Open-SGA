<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA - Sistema Global Armonizado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center">
    <div class="text-center">
        <div class="bg-white rounded-2xl shadow-2xl p-12 max-w-lg">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                </svg>
            </div>
            
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Química Boss</h1>
            <h2 class="text-xl text-slate-600 mb-8">Sistema Global Armonizado</h2>
            
            <p class="text-slate-500 mb-8">
                Sistema de gestión de etiquetas GHS para productos químicos.
                Cumplimiento con NOM-018-STPS-2015.
            </p>
            
            <a href="{{ url_for('auth.login') }}" 
               class="inline-flex items-center justify-center w-full py-3 px-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors">
                Iniciar Sesión
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </a>
        </div>
        
        <p class="text-slate-400 mt-8 text-sm">
            SGA v1.0 Web Edition
        </p>
    </div>
</body>
</html>
