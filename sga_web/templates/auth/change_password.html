{% extends "base.html" %}

{% block title %}Cambiar Contraseña{% endblock %}
{% block page_title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-8">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-slate-800">Cambiar Contraseña</h3>
            <p class="text-sm text-slate-500">Ingrese su contraseña actual y la nueva</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.change_password') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-4">
                <label for="current_password" class="block text-sm font-medium text-slate-700 mb-1">
                    Contraseña Actual
                </label>
                <input type="password" id="current_password" name="current_password" required
                       class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            
            <div class="mb-4">
                <label for="new_password" class="block text-sm font-medium text-slate-700 mb-1">
                    Nueva Contraseña
                </label>
                <input type="password" id="new_password" name="new_password" required minlength="6"
                       class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                <p class="text-xs text-slate-500 mt-1">Mínimo 6 caracteres</p>
            </div>
            
            <div class="mb-6">
                <label for="confirm_password" class="block text-sm font-medium text-slate-700 mb-1">
                    Confirmar Nueva Contraseña
                </label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            
            <div class="flex space-x-3">
                <a href="{{ url_for('main.dashboard') }}"
                   class="flex-1 py-2 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 text-center rounded-lg transition-colors">
                    Cancelar
                </a>
                <button type="submit"
                        class="flex-1 py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                    Guardar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
