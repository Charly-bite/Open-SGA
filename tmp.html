    <!-- Global CSRF token injection for fetch/XHR -->
    <script>
    (function() {
        const token = document.querySelector('meta[name="csrf-token"]');
        if (!token) return;
        const csrfToken = token.getAttribute('content');
        // Monkey-patch fetch to auto-include X-CSRFToken header
        const _fetch = window.fetch;
        window.fetch = function(url, opts) {
            opts = opts || {};
            opts.headers = opts.headers || {};
            // Only add for same-origin requests
            if (typeof url === 'string' && (url.startsWith('/') || url.startsWith(location.origin))) {
                if (!opts.headers['X-CSRFToken']) {
                    opts.headers['X-CSRFToken'] = csrfToken;
                }
            }
            return _fetch.call(this, url, opts);
        };
    })();
    </script>
