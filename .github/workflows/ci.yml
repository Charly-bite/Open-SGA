name: CI Pipeline

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
    - name: Run Black
      run: black --check .
    - name: Run Flake8
      run: flake8

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock
    - name: Run tests (excluding integration)
      run: pytest tests/ -v -m "not integration" --cov=sga_web
      env:
        SGA_ENV: testing
        FLASK_ENV: testing
        SQL_PASSWORD: ci_test_password
        PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/sga_web

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit
    - name: Run Bandit (SAST)
      run: bandit -r sga_web/ -c .bandit.yaml --severity-level medium
    - name: Run pip-audit (SCA)
      run: pip-audit -r requirements.txt
    - name: Run TruffleHog (Secrets)
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified
