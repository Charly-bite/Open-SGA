<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA File Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0a0e1a;--bg-card:rgba(255,255,255,.03);--glass:rgba(255,255,255,.08);--text:#f1f5f9;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--purple:#8b5cf6;--amber:#f59e0b;--rose:#f43f5e}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        .bg-glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
        .bg-glow .orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:.1;animation:fl 25s ease-in-out infinite}
        .bg-glow .orb:nth-child(1){width:500px;height:500px;background:#8b5cf6;top:10%;left:-5%}
        .bg-glow .orb:nth-child(2){width:400px;height:400px;background:#06b6d4;bottom:0;right:-5%;animation-delay:-10s}
        @keyframes fl{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-25px) scale(1.04)}}
        .container{max-width:960px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
        .top-bar{display:flex;align-items:center;padding:24px 0 0}
        .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--text2);text-decoration:none;font-size:.88rem;font-weight:600;transition:color .2s}
        .back-link:hover{color:var(--blue)}
        .back-link svg{width:16px;height:16px}
        header{padding:32px 0 8px;text-align:center}
        header h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;letter-spacing:-1px;margin-bottom:8px;background:linear-gradient(135deg,#f1f5f9 30%,#94a3b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        header p{color:var(--text2);font-size:.95rem;margin-bottom:32px}

        /* Search */
        .search-box{position:relative;max-width:480px;margin:0 auto 32px}
        .search-box input{width:100%;background:var(--bg-card);border:1px solid var(--glass);border-radius:12px;padding:12px 16px 12px 44px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
        .search-box input:focus{border-color:rgba(59,130,246,.4)}
        .search-box input::placeholder{color:var(--muted)}
        .search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}

        /* Tree */
        .tree{margin-bottom:64px}
        .tree-node{border-bottom:1px solid rgba(255,255,255,.04)}
        .tree-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:8px;transition:background .15s;user-select:none}
        .tree-header:hover{background:rgba(255,255,255,.04)}
        .tree-toggle{width:18px;height:18px;flex-shrink:0;color:var(--muted);transition:transform .2s}
        .tree-node.open>.tree-header .tree-toggle{transform:rotate(90deg)}
        .tree-node:not(.has-children)>.tree-header .tree-toggle{visibility:hidden}
        .tree-icon{width:20px;height:20px;flex-shrink:0}
        .tree-icon.folder{color:var(--amber)}
        .tree-icon.python{color:var(--blue)}
        .tree-icon.html{color:var(--rose)}
        .tree-icon.json{color:var(--green)}
        .tree-icon.config{color:var(--purple)}
        .tree-icon.csv{color:var(--cyan)}
        .tree-icon.other{color:var(--muted)}
        .tree-name{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:600;color:var(--text)}
        .tree-desc{font-size:.8rem;color:var(--text2);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50%}
        .tree-size{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;flex-shrink:0;min-width:60px;text-align:right}
        .tree-children{padding-left:24px;display:none}
        .tree-node.open>.tree-children{display:block}

        .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}
        .badge-bp{background:rgba(59,130,246,.15);color:var(--blue)}
        .badge-manager{background:rgba(16,185,129,.15);color:var(--green)}
        .badge-model{background:rgba(139,92,246,.15);color:var(--purple)}
        .badge-config{background:rgba(245,158,11,.15);color:var(--amber)}
        .badge-template{background:rgba(244,63,94,.15);color:var(--rose)}
        .badge-data{background:rgba(6,182,212,.15);color:var(--cyan)}

        .hidden{display:none!important}

        footer{text-align:center;padding:32px 0;color:var(--muted);font-size:.8rem;border-top:1px solid var(--glass)}
        footer a{color:var(--blue);text-decoration:none}
    </style>
</head>

        function getIcon(name, isDir) {
            if (isDir) return { svg: ICONS.folder, cls: 'folder' };
            const ext = name.split('.').pop().toLowerCase();

            if (ext === 'html' || ext === 'htm') return { svg: ICONS.html, cls: 'html' };
            if (ext === 'json') return { svg: ICONS.json, cls: 'json' };
            if (ext === 'csv') return { svg: ICONS.csv, cls: 'csv' };
            if (['env','cfg','ini','toml','yml','yaml','bat','sh','ps1','tex','txt','md'].includes(ext)) return { svg: ICONS.config, cls: 'config' };
            return { svg: ICONS.other, cls: 'other' };

        // Render tree
        function renderTree(nodes, container) {
            nodes.forEach(node => {
                const isDir = !!node.children;
                const hasChildren = isDir && node.children.length > 0;
                const el = document.createElement('div');
                el.className = 'tree-node' + (hasChildren ? ' has-children' : '');
                el.dataset.name = (node.name + ' ' + (node.desc || '')).toLowerCase();

                const icon = getIcon(node.name, isDir);
                let badgeHtml = node.badge ? `<span class="badge ${node.badgeCls || ''}">${node.badge}</span>` : '';

                el.innerHTML = `
                    <div class="tree-header">
                        <span class="tree-toggle">${ICONS.chevron}</span>
                        <span class="tree-icon ${icon.cls}">${icon.svg}</span>
                        <span class="tree-name">${node.name}</span>
                        ${badgeHtml}
                        <span class="tree-desc">${node.desc || ''}</span>
                        <span class="tree-size">${fmtSize(node.size)}</span>
                    </div>
                `;

                if (hasChildren) {
                    const childContainer = document.createElement('div');
                    childContainer.className = 'tree-children';
                    renderTree(node.children, childContainer);
                    el.appendChild(childContainer);
                }

                // Toggle
                el.querySelector('.tree-header').addEventListener('click', (e) => {
                    if (hasChildren) {
                        el.classList.toggle('open');
                    }
                });

                container.appendChild(el);
            });
        }

        const treeContainer = document.getElementById('fileTree');
        renderTree(tree, treeContainer);

        // Expand top-level by default
        treeContainer.querySelectorAll(':scope > .tree-node.has-children').forEach(n => n.classList.add('open'));

        // Search

        searchInput.addEventListener('input', () => {

            const allNodes = treeContainer.querySelectorAll('.tree-node');

            if (!q) {
                allNodes.forEach(n => n.classList.remove('hidden'));
                return;
            }

            // First hide all, then show matches and their ancestors
            allNodes.forEach(n => n.classList.add('hidden'));
            allNodes.forEach(n => {
                if (n.dataset.name && n.dataset.name.includes(q)) {
                    n.classList.remove('hidden');
                    // Show all ancestors
                    let parent = n.parentElement;
                    while (parent && parent !== treeContainer) {
                        if (parent.classList.contains('tree-node')) {
                            parent.classList.remove('hidden');
                            parent.classList.add('open');
                        }
                        parent = parent.parentElement;
                    }
                    // Show children
                    n.querySelectorAll('.tree-node').forEach(c => c.classList.remove('hidden'));
                    n.classList.add('open');
                }
            });
        });
    </script>
</body>
</html>
